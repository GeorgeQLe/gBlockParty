name: Scrape YouTube Views

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape YouTube channel
        run: node scripts/scrape-youtube.mjs

      - name: Commit if data changed
        run: |
          git diff --quiet data/youtube-views.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/youtube-views.json
          git commit -m "chore(data): update youtube-views.json [skip ci]"
          git push

      - name: Trigger Vercel rebuild
        if: env.VERCEL_DEPLOY_HOOK != ''
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: curl -sS -X POST "$VERCEL_DEPLOY_HOOK"
